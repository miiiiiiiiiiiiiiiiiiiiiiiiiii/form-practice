<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormPractice</title>
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <main class="wrapper">
    <h1 class="page-title">フォーム作成</h1>

    <section class="form-card">
      <h2 class="form-title">アカウント作成</h2>

      <form action="#" method="post">
        <section class="form-section">
          <h3 class="section-title">個人情報</h3>

          <div class="form-group">
            <label for="last-name">名字 <span class="required">*</span></label>
            <input type="text" id="last-name" name="last-name">
          </div>

          <div class="form-group">
            <label for="first-name">名前 <span class="required">*</span></label>
            <input type="text" id="first-name" name="first-name">
          </div>

          <div class="form-group">
            <p class="field-label">生年月日 <span class="required">*</span></p>
            <div class="birth-row">
              <select name="birth-year">
                <option value="">年</option>
                <option>2000</option>
                <option>2001</option>
                <option>2002</option>
                <option>2003</option>
                <option>2004</option>
                <option>2005</option>
                <option>2006</option>
                <option>2007</option>
                <option>2008</option>
                <option>2009</option>
                <option>2010</option>
              </select>

              <select name="birth-month">
                <option value="">月</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>7</option>
                <option>8</option>
                <option>9</option>
                <option>10</option>
                <option>11</option>
                <option>12</option>
              </select>

              <select name="birth-day">
                <option value="">日</option>
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>
                <option>7</option>
                <option>8</option>
                <option>9</option>
                <option>10</option>
                <option>11</option>
                <option>12</option>
                <option>13</option>
                <option>14</option>
                <option>15</option>
                <option>16</option>
                <option>17</option>
                <option>18</option>
                <option>19</option>
                <option>20</option>
                <option>21</option>
                <option>22</option>
                <option>23</option>
                <option>24</option>
                <option>25</option>
                <option>26</option>
                <option>27</option>
                <option>28</option>
                <option>29</option>
                <option>30</option>
                <option>31</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <p class="field-label">性別 <span class="required">*</span></p>
            <div class="radio-row">
              <label class="radio-label"><input type="radio" name="gender" value="male">男性</label>
              <label class="radio-label"><input type="radio" name="gender" value="female">女性</label>
              <label class="radio-label"><input type="radio" name="gender" value="other">その他</label>
            </div>
          </div>

          <div class="form-group">
            <label for="job">職業</label>
            <select id="job" name="job">
              <option value="">選択してください</option>
              <option>学生</option>
              <option>会社員</option>
              <option>主婦</option>
              <option>その他</option>
            </select>
          </div>
        </section>

        <section class="form-section">
          <h3 class="section-title">アカウント情報</h3>

          <div class="form-group">
            <label for="account-name">アカウント名 <span class="required">*</span></label>
            <input type="text" id="account-name" name="account-name">
          </div>

          <div class="form-group">
            <label for="email">メールアドレス <span class="required">*</span></label>
            <input type="email" id="email" name="email">
          </div>

          <div class="form-group">
            <label for="password">パスワード <span class="required">*</span></label>
            <input type="password" id="password" name="password">
          </div>

          <div class="form-group">
            <label for="confirm-password">確認用パスワード <span class="required">*</span></label>
            <input type="password" id="confirm-password" name="confirm-password">
          </div>
        </section>

        <section class="form-section">
          <h3 class="section-title">連絡先</h3>

          <div class="form-group">
            <label for="address">住所 <span class="required">*</span></label>
            <input type="text" id="address" name="address">
          </div>

          <div class="form-group">
            <label for="tel">電話番号 <span class="required">*</span></label>
            <input type="tel" id="tel" name="tel">
          </div>
        </section>

        <section class="form-section form-section-last">
          <h3 class="section-title">購読情報</h3>

          <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" name="mailmagazine">メールマガジン</label>
          </div>

          <div class="checkbox-group">
            <label class="checkbox-label"><input type="checkbox" name="coupon">クーポン</label>
          </div>
        </section>

        <button type="submit" class="submit-btn">アカウント作成</button>

        <p class="notice-text">
          アカウントを作成することにより、
          <a href="#">利用規約</a>と<a href="#">プライバシーポリシー</a>に同意するものとします。
        </p>
      </form>
    </section>
  </main>
</body>

</html>
